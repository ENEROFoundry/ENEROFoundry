# Project
site_name: OEO Foundry
site_url: https://github.com/OEOFoundry/website/
site_description: Website of the OEO Foundry

# Repository
repo_name: OEOFoundry/website
repo_url: https://github.com/OEOFoundry/website
docs_dir: docs
copyright: OEO Foundry &copy; Reiner Lemoine Institut &copy; Universität Osnabrück &copy; OFFIS | CC-BY-4.0

# Configuration
theme:
  name: material
  logo: img/OpenEnergyFamily_Logo_OEOFoundry.png
  favicon: img/favicon_oeo-foundry.ico
  palette:
    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - toc.follow

# extensions
markdown_extensions:
  - toc:
      permalink: "#"
  - admonition
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.highlight:
      use_pygments: true

plugins:
- search:
    separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'

# Customization
extra:
  generator: false
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/OEOFoundry/website
    - icon: fontawesome/brands/mastodon
      link: https://mastodon.social/@RL_Institut@wisskomm.social

extra_css:
  - extra.css

# Navigation
nav:
  - Home: index.md
  - Principles: principles.md
  - Community: community.md
  - Contact: contact.md
